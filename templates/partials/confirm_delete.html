<form method="post" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 max-w-xl">
    {% csrf_token %}
    <h3 class="text-lg font-semibold text-slate-900 mb-2">Delete {{ object_name|default:object }}?</h3>
    <p class="text-sm text-slate-600 mb-5">{{ message|default:"This action cannot be undone." }}</p>
    <div class="flex gap-2">
        <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white text-sm font-medium px-4 py-2 rounded-lg">Yes, delete</button>
        <a href="{{ cancel_url }}" class="text-sm text-slate-600 px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</a>
    </div>
</form>
