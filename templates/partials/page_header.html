<div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-5">
    <div>
        <h2 class="text-2xl font-semibold text-slate-900">{{ title }}</h2>
        {% if subtitle %}<p class="text-sm text-slate-500 mt-1">{{ subtitle }}</p>{% endif %}
    </div>
    {% if action_url %}
        <a href="{{ action_url }}" class="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm">
            {{ action_label|default:"New" }}
        </a>
    {% endif %}
</div>
