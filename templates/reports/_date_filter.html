<form method="get" class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex flex-wrap gap-2 mb-4 items-end">
    <div><label class="text-xs text-slate-500">From</label><input type="date" name="start" value="{{ start }}" class="block rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
    <div><label class="text-xs text-slate-500">To</label><input type="date" name="end" value="{{ end }}" class="block rounded-lg border border-slate-300 px-3 py-2 text-sm"></div>
    <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm">Apply</button>
</form>
