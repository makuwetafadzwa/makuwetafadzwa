{% extends "base.html" %}
{% block page_title %}Reject quotation{% endblock %}
{% block content %}
<form method="post" class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 max-w-xl">
    {% csrf_token %}
    <h3 class="font-semibold mb-2">Reject {{ quotation.quote_number }}?</h3>
    <p class="text-sm text-slate-500 mb-4">Optionally record a reason for rejection.</p>
    {{ form.reason }}
    <div class="mt-4 flex gap-2">
        <button class="bg-rose-600 hover:bg-rose-700 text-white text-sm px-4 py-2 rounded-lg">Confirm rejection</button>
        <a href="{{ quotation.get_absolute_url }}" class="text-sm border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-50">Cancel</a>
    </div>
</form>
{% endblock %}
